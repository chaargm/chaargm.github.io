        const App = {
            currentIndex: 0,

            init() {
                // Safely attach events
                document.getElementById('prevBtn').onclick = () => this.move(-1);
                document.getElementById('nextBtn').onclick = () => this.move(1);
                document.getElementById('randBtn').onclick = () => this.random();
                
                // Keyboard support
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight') this.move(1);
                    if (e.key === 'ArrowLeft') this.move(-1);
                });

                this.render();
            },

            move(step) {
                this.currentIndex = (this.currentIndex + step + RAW_DATA.length) % RAW_DATA.length;
                this.render();
            },

            random() {
                this.currentIndex = Math.floor(Math.random() * RAW_DATA.length);
                this.render();
            },

            render() {
                const item = RAW_DATA[this.currentIndex];
                const root = document.getElementById('ui-root');
                const counter = document.getElementById('counter');
                const aiRoot = document.getElementById('ai-root');

                if (!item) {
                    root.innerHTML = "No data found. Please paste your JSON into the script tag.";
                    return;
                }

                // Render Content Cards
                root.innerHTML = `
                    <div class="card">
                        <span class="label" style="color: var(--raw-red)">The Raw Thought</span>
                        <div class="content">"${item.raw}"</div>
                    </div>
                    <div class="card">
                        <span class="label" style="color: var(--pro-green)">The Professional Flip</span>
                        <div class="content">"${item.pro}"</div>
                    </div>
                    <div class="card reasoning-card">
                        <span class="label">Deep Reasoning</span>
                        <div class="reasoning-text">${item.reason}</div>
                    </div>
                `;

                // Update Counter
                counter.innerText = `Entry ${this.currentIndex + 1} of ${RAW_DATA.length}`;

                // Generate Dynamic AI Link
                const prompt = encodeURIComponent(`In a workplace setting, explain why the professional phrase "${item.pro}" is more effective than saying "${item.raw}". Use psychological reasoning.`);
                aiRoot.innerHTML = `<a href="https://gemini.google.com{prompt}" target="_blank" class="ai-link">Deep Dive with AI →</a>`;
            }
        };

        window.onload = () => App.init();
