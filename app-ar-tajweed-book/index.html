<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajweed Learner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: white; height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Header & Pagination */
        header { padding: 15px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { padding: 12px 20px; border-radius: 8px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        /* PDF View Area */
        #pdf-slide { height: 280px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid #ddd; }
        #pdf-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Content Area */
        .content-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .section-title { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; border-left: 4px solid #007bff; padding-left: 10px; }
        
        .glossary-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 18px; }
        .arabic { font-weight: bold; color: #1a237e; font-size: 22px; }
        
        .breakdown-container { display: flex; flex-wrap: wrap; gap: 10px; direction: rtl; }
        .word-bubble { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 10px; border-radius: 12px; text-align: center; min-width: 70px; }
        
        .translation-box { background: #37474f; color: white; padding: 15px; border-radius: 12px; font-style: italic; line-height: 1.5; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">← PREV</button>
        <div id="pageIndicator" style="font-weight: bold;">Loading...</div>
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">NEXT →</button>
    </header>

    <div id="pdf-slide">
        <img id="pageImg" src="" alt="Page Slide">
    </div>

    <div class="content-scroll">
        <div class="section-title">Glossary</div>
        <div id="glossaryList"></div>

        <div class="section-title">Word by Word</div>
        <div id="breakdownList" class="breakdown-container"></div>

        <div class="section-title">Translation</div>
        <div id="translationText" class="translation-box"></div>
    </div>
</div>

<script>
    let currentPage = 1;
    let totalPages = 1;

    async function init() {
        try {
            // 1. Get total page count (bust cache)
            const resp = await fetch(`data/page_count.txt?t=${Date.now()}`);
            const text = await resp.text();
            totalPages = parseInt(text.trim());
            loadPage();
        } catch (e) {
            console.error("Failed to initialize:", e);
            document.getElementById('pageIndicator').innerText = "Error Loading";
        }
    }

    async function loadPage() {
        const pageStr = String(currentPage).padStart(3, '0');
        const cacheBuster = `t=${Date.now()}`;

        // Update Image
        document.getElementById('pageImg').src = `data/page${pageStr}.png?${cacheBuster}`;
        
        // Fetch JSON
        try {
            const resp = await fetch(`data/page${pageStr}.json?${cacheBuster}`);
            const data = await resp.json();
            renderContent(data);
        } catch (e) {
            console.error("Data fetch failed", e);
        }

        // Update UI
        document.getElementById('pageIndicator').innerText = `${currentPage} / ${totalPages}`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);
    }

    function renderContent(data) {
        // Glossary
        const glossDiv = document.getElementById('glossaryList');
        glossDiv.innerHTML = data.glossary.map(item => `
            <div class="glossary-item">
                <span class="arabic">${item.word}</span>
                <span>${item.meaning}</span>
            </div>
        `).join('');

        // Word Breakdown
        const breakDiv = document.getElementById('breakdownList');
        breakDiv.innerHTML = data.word_breakdown.map(item => `
            <div class="word-bubble">
                <div class="arabic" style="font-size: 18px;">${item.arabic}</div>
                <div style="font-size: 12px; color: #666;">${item.meaning}</div>
            </div>
        `).join('');

        // Translation
        document.getElementById('translationText').innerText = data.translation;
    }

    function changePage(step) {
        currentPage += step;
        loadPage();
    }

    init();
</script>

</body>
</html>
