<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to YAML Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .converter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-section, .output-section {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        #yamlOutput {
            background: #f8f9fa;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .convert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .copy-btn {
            background: #28a745;
            color: white;
        }

        .copy-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .clear-btn {
            background: #6c757d;
            color: white;
        }

        .clear-btn:hover {
            background: #5a6268;
        }

        .error {
            color: #dc3545;
            padding: 15px;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
        }

        .success {
            color: #155724;
            padding: 15px;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
        }

        @media (max-width: 768px) {
            .converter-grid {
                grid-template-columns: 1fr;
            }

            textarea {
                height: 300px;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JSON to YAML Converter</h1>
        
        <div class="converter-grid">
            <div class="input-section">
                <label for="jsonInput">JSON Input</label>
                <textarea id="jsonInput" placeholder='Paste your JSON here, e.g.:
{
  "name": "John",
  "age": 30,
  "city": "New York"
}'></textarea>
            </div>
            
            <div class="output-section">
                <label for="yamlOutput">YAML Output</label>
                <textarea id="yamlOutput" readonly placeholder="YAML output will appear here..."></textarea>
            </div>
        </div>

        <div class="button-group">
            <button class="convert-btn" onclick="convertToYAML()">Convert to YAML</button>
            <button class="copy-btn" onclick="copyToClipboard()">Copy YAML</button>
            <button class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>

        <div id="errorMessage" class="error"></div>
        <div id="successMessage" class="success"></div>
    </div>

    <script>
        function jsonToYaml(obj, indent = 0) {
            const spaces = '  '.repeat(indent);
            let yaml = '';

            if (obj === null) {
                return 'null';
            }

            if (typeof obj !== 'object') {
                if (typeof obj === 'string') {
                    // Check if string needs quotes
                    if (obj.includes('\n') || obj.includes(':') || obj.includes('#') || 
                        obj.match(/^[\d\.]/) || obj === '' || 
                        ['true', 'false', 'null', 'yes', 'no'].includes(obj.toLowerCase())) {
                        return `"${obj.replace(/"/g, '\\"')}"`;
                    }
                    return obj;
                }
                return String(obj);
            }

            if (Array.isArray(obj)) {
                if (obj.length === 0) {
                    return '[]';
                }
                obj.forEach(item => {
                    if (typeof item === 'object' && item !== null && !Array.isArray(item)) {
                        yaml += `\n${spaces}-`;
                        const itemYaml = jsonToYaml(item, indent + 1);
                        const lines = itemYaml.split('\n');
                        lines.forEach((line, i) => {
                            if (i === 0) {
                                yaml += ` ${line}`;
                            } else {
                                yaml += `\n${'  '.repeat(indent + 1)}${line}`;
                            }
                        });
                    } else {
                        yaml += `\n${spaces}- ${jsonToYaml(item, indent + 1)}`;
                    }
                });
                return yaml.substring(1);
            }

            const keys = Object.keys(obj);
            if (keys.length === 0) {
                return '{}';
            }

            keys.forEach((key, index) => {
                const value = obj[key];
                
                if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                    yaml += `${index > 0 ? '\n' : ''}${spaces}${key}:`;
                    const nestedYaml = jsonToYaml(value, indent + 1);
                    if (nestedYaml) {
                        yaml += `\n${'  '.repeat(indent + 1)}${nestedYaml}`;
                    }
                } else if (Array.isArray(value)) {
                    yaml += `${index > 0 ? '\n' : ''}${spaces}${key}:`;
                    if (value.length === 0) {
                        yaml += ' []';
                    } else {
                        yaml += jsonToYaml(value, indent + 1);
                    }
                } else {
                    yaml += `${index > 0 ? '\n' : ''}${spaces}${key}: ${jsonToYaml(value, indent)}`;
                }
            });

            return yaml;
        }

        function convertToYAML() {
            const jsonInput = document.getElementById('jsonInput').value.trim();
            const yamlOutput = document.getElementById('yamlOutput');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            if (!jsonInput) {
                errorMessage.textContent = 'Please paste some JSON to convert.';
                errorMessage.style.display = 'block';
                return;
            }

            try {
                const jsonObj = JSON.parse(jsonInput);
                const yaml = jsonToYaml(jsonObj);
                yamlOutput.value = yaml;
                successMessage.textContent = 'Successfully converted to YAML!';
                successMessage.style.display = 'block';
            } catch (error) {
                errorMessage.textContent = `Invalid JSON: ${error.message}`;
                errorMessage.style.display = 'block';
                yamlOutput.value = '';
            }
        }

        function copyToClipboard() {
            const yamlOutput = document.getElementById('yamlOutput');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');

            if (!yamlOutput.value) {
                errorMessage.textContent = 'Nothing to copy. Please convert JSON first.';
                errorMessage.style.display = 'block';
                return;
            }

            yamlOutput.select();
            document.execCommand('copy');
            
            successMessage.textContent = 'YAML copied to clipboard!';
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';

            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 2000);
        }

        function clearAll() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('yamlOutput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // Auto-convert on input
        document.getElementById('jsonInput').addEventListener('input', function() {
            if (this.value.trim()) {
                convertToYAML();
            }
        });
    </script>
</body>
</html>
