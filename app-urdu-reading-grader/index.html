<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urdu Reading Grader</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #fdfaf6; --success: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: var(--primary); text-align: right; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Pagination Controls */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }
        #pageIndicator { font-weight: bold; font-size: 20px; }

        .urdu-page-container { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .urdu-image { width: 100%; border-radius: 8px; display: block; min-height: 300px; background: #eee; }
        
        .audio-section { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        audio { width: 100%; height: 50px; margin-top: 10px; }

        .feedback-form { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .star-rating { font-size: 40px; color: #ddd; cursor: pointer; margin: 10px 0; display: flex; justify-content: center; gap: 8px; }
        .star-rating span.active { color: #f1c40f; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button#saveBtn { background: var(--success); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 20px; width: 100%; cursor: pointer; }

        .comment-card { background: white; padding: 12px; border-radius: 10px; margin-top: 10px; border-right: 5px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .reviewer-name { font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <!-- Navigation -->
    <div class="nav-bar">
        <button class="nav-btn" onclick="changePage(-1)" id="prevBtn">پچھلا (Back)</button>
        <div id="pageIndicator">صفحہ 001</div>
        <button class="nav-btn" onclick="changePage(1)" id="nextBtn">اگلا (Next)</button>
    </div>

    <!-- Image Display -->
    <div class="urdu-page-container">
        <img id="mainImage" src="" alt="Urdu Page" class="urdu-image">
    </div>

    <!-- Audio Player -->
    <div class="audio-section">
        <strong>تلاوت سنیں (Listen)</strong>
        <audio id="mainAudio" controls src=""></audio>
    </div>

    <!-- Feedback Form -->
    <div class="feedback-form">
        <h3 style="margin:0">آپ کی رائے (Your Review)</h3>
        <div class="star-rating" id="starContainer">
            <span onclick="setRating(1)">☆</span><span onclick="setRating(2)">☆</span><span onclick="setRating(3)">☆</span><span onclick="setRating(4)">☆</span><span onclick="setRating(5)">☆</span>
        </div>
        <input type="text" id="userName" placeholder="آپ کا نام (Your Name)">
        <textarea id="userComment" placeholder="تبصرہ (Comment)"></textarea>
        <button id="saveBtn">محفوظ کریں (Save)</button>
    </div>

    <!-- History -->
    <div id="commentsList"></div>
</div>

<script>
    let currentPage = 1;
    let maxPages = 1;

    // Dummy Data Store for the 4 files
    const spoofedData = {
        1: [ {name: "عبداللہ شیخ", stars: "★★★★★", text: "بہترین ادائیگی!"}, {name: "سکینہ بیگم", stars: "★★★★☆", text: "بہت پیاری آواز۔"} ],
        2: [ {name: "ارشد خان", stars: "★★★☆☆", text: "رفتار تھوڑی تیز تھی۔"}, {name: "پروین اختر", stars: "★★★★★", text: "ماشاءاللہ!"} ],
        3: [ {name: "محمد علی", stars: "★★★★☆", text: "تلفظ بہت اچھا ہے۔"}, {name: "فاطمہ زہرا", stars: "★★★★★", text: "سبق آموز تلاوت۔"} ],
        4: [ {name: "زینب بانو", stars: "★★★☆☆", text: "آواز تھوڑی کم تھی۔"}, {name: "عمران خان", stars: "★★★★★", text: "عمدہ کوشش۔"} ]
    };

    async function init() {
        try {
            // Cache bust page_count.txt
            const resp = await fetch(`data/page_count.txt?t=${Date.now()}`);
            const text = await resp.text();
            maxPages = parseInt(text.trim()) || 1;
        } catch (e) {
            maxPages = 4; // Fallback to 4 as per your prompt
        }
        updateUI();
    }

    function updateUI() {
        const pageStr = String(currentPage).padStart(3, '0');
        
        // Update Assets
        document.getElementById('mainImage').src = `data/page${pageStr}.png`;
        document.getElementById('mainAudio').src = `data/recording${pageStr}.mp3`;
        document.getElementById('pageIndicator').innerText = `صفحہ ${pageStr}`;

        // Update Buttons
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPages);

        // Load Comments
        const list = document.getElementById('commentsList');
        list.innerHTML = '<h4>پرانی آراء (Previous Reviews)</h4>';
        (spoofedData[currentPage] || []).forEach(c => {
            list.innerHTML += `
                <div class="comment-card">
                    <div><span class="reviewer-name">${c.name}</span> <span style="color:#f1c40f">${c.stars}</span></div>
                    <p style="margin:5px 0 0 0">${c.text}</p>
                </div>`;
        });
    }

    function changePage(step) {
        currentPage += step;
        updateUI();
        window.scrollTo(0,0);
    }

    function setRating(n) {
        const stars = document.querySelectorAll('#starContainer span');
        stars.forEach((s, i) => s.classList.toggle('active', i < n));
        stars.forEach((s, i) => s.innerText = i < n ? '★' : '☆');
    }

    init();
</script>
</body>
</html>
