<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Scrub PoC v11</title>
    <!-- 
    ========================================================================
    PROJECT SPECIFICATIONS
    ========================================================================
    - Audio: MediaRecorder (200ms slices) saved in 'recordedChunks'.
    - Playback: Re-instantiates Blob URL on every seek to ensure seekability.
    - Waveform: 
        * Live: Real-time frequency oscilloscope via AnalyserNode.
        * Static: Post-recording RMS amplitude history map.
    - Marker Types:
        * Blue (nav): Generated by Arrow Key jumps (10% step).
        * Red (mistake): Generated by 'M' key or 'Mark Mistake' button.
    - Navigation: Clickable markers with 20px hit-detection on overlay canvas.
    ========================================================================
    -->

    <!-- 
    ========================================================================
    AI HANDOFF INSTRUCTIONS
    ========================================================================
    - RELIABILITY FIX: Keyboard listeners are attached to 'window' to capture 
      events regardless of element focus. 
    - M-KEY FIX: Used 'e.code === "KeyM"' for layout independence.
    - STATE SYNC: 'dropMarker' checks if recording is active to use 'Date.now()' 
      timing; otherwise, it uses 'scrubber.value'.
    - RENDER: 'redrawMarkers' is the single source of truth for the overlay.
    ========================================================================
    -->
    <style>
        :root { --accent: #00ffcc; --mistake: #ff4757; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; background: var(--bg); color: var(--text); }
        .card { background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 550px; text-align: center; border: 1px solid #333; }
        canvas#waveform { width: 100%; height: 100px; background: #000; border-radius: 8px; margin-bottom: 0.5rem; border: 1px solid #444; }
        .scrub-container { position: relative; width: 100%; height: 50px; margin-top: 10px; }
        #markerCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; cursor: crosshair; }
        input[type=range] { position: relative; width: 100%; z-index: 2; background: transparent; cursor: pointer; accent-color: var(--accent); -webkit-appearance: none; margin: 15px 0; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        button { padding: 10px; font-size: 0.8rem; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; outline: none; }
        #recBtn { background: #ff4757; color: white; grid-column: span 2; padding: 15px; font-size: 1.1rem; }
        #recBtn.recording { background: #ff4757; box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); animation: pulse 1.5s infinite; }
        #mistakeBtn { background: var(--mistake); color: white; }
        .btn-sec { background: #333; color: #ccc; }
        .btn-sec:hover { background: #444; }
        .btn-active { background: var(--accent) !important; color: #000 !important; }
        .status-row { display: flex; justify-content: space-between; font-family: monospace; color: #888; margin: 5px 0; font-size: 0.9rem; }
        .hint { font-size: 0.75rem; color: #555; margin-top: 15px; line-height: 1.4; text-align: left; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    </style>
</head>
<body>

<div class="card">
    <canvas id="waveform"></canvas>
    <div class="status-row">
        <span id="status">READY</span>
        <span id="timer">00:00.0</span>
    </div>

    <div class="controls">
        <button id="recBtn">START RECORDING</button>
        <button id="mistakeBtn">Mark Mistake (M)</button>
        <button id="loopBtn" class="btn-sec" disabled>Toggle Loop</button>
        <button id="dlBtn" class="btn-sec" disabled>Download Audio</button>
        <button id="exportBtn" class="btn-sec" disabled>Export Markers</button>
        <button id="clearBtn" class="btn-sec" style="grid-column: span 2;">Clear All Markers</button>
    </div>

    <div class="scrub-container">
        <canvas id="markerCanvas"></canvas>
        <input type="range" id="scrubber" min="0" value="0" step="0.01" disabled>
    </div>
    
    <div class="hint">
        <b>M Key</b>: Drop Red Mistake Marker (Works during Recording & Playback)<br>
        <b>Arrows</b>: Jump & Blue Marker | <b>Space</b>: Play/Pause
    </div>
    <audio id="playback" style="display:none;"></audio>
</div>

<script>
    let audioCtx, analyser, source, dataArray, animationId;
    let mediaRecorder, recordedChunks = [], startTime, timerInterval;
    let markers = [], amplitudeHistory = [], isLooping = false;
    
    const canvas = document.getElementById('waveform'), cCtx = canvas.getContext('2d');
    const mCanvas = document.getElementById('markerCanvas'), mCtx = mCanvas.getContext('2d');
    const recBtn = document.getElementById('recBtn'), dlBtn = document.getElementById('dlBtn');
    const mistakeBtn = document.getElementById('mistakeBtn'), loopBtn = document.getElementById('loopBtn');
    const clearBtn = document.getElementById('clearBtn'), exportBtn = document.getElementById('exportBtn');
    const scrubber = document.getElementById('scrubber'), playback = document.getElementById('playback');
    const statusText = document.getElementById('status'), timerText = document.getElementById('timer');

    function syncCanvas() {
        mCanvas.width = mCanvas.offsetWidth; mCanvas.height = mCanvas.offsetHeight;
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        if (mediaRecorder?.state !== "recording" && amplitudeHistory.length > 0) drawStaticWaveform();
        redrawMarkers();
    }
    window.addEventListener('resize', syncCanvas); syncCanvas();

    // Interaction
    recBtn.onclick = () => (mediaRecorder?.state === "recording") ? stopRecording() : startRecording();
    mistakeBtn.onmousedown = (e) => { e.preventDefault(); dropMarker('mistake'); };
    clearBtn.onclick = () => { markers = []; redrawMarkers(); isLooping = false; loopBtn.classList.remove('btn-active'); };
    
    dlBtn.onclick = () => saveFile(URL.createObjectURL(new Blob(recordedChunks, {type:'audio/webm'})), `rec_${Date.now()}.webm`);
    exportBtn.onclick = () => {
        const txt = markers.sort((a,b)=>a.time-b.time).map((m,i)=>`${m.type.toUpperCase()} M${i+1}: ${m.time.toFixed(2)}s`).join('\n');
        saveFile(URL.createObjectURL(new Blob([txt], {type:'text/plain'})), `markers_${Date.now()}.txt`);
    };

    function saveFile(url, name) {
        const a = document.createElement('a'); a.href = url; a.download = name; a.click(); URL.revokeObjectURL(url);
    }

    loopBtn.onclick = () => {
        if (markers.length < 2) return;
        isLooping = !isLooping;
        loopBtn.classList.toggle('btn-active', isLooping);
        if (isLooping) {
            const range = markers.slice(-2).sort((a,b) => a.time - b.time);
            seekTo(range[0].time);
        }
    };

    async function startRecording() {
        recordedChunks = []; markers = []; amplitudeHistory = []; isLooping = false;
        loopBtn.classList.remove('btn-active'); redrawMarkers();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser();
        source = audioCtx.createMediaStreamSource(stream); source.connect(analyser);
        analyser.fftSize = 512; dataArray = new Uint8Array(analyser.frequencyBinCount);
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.start(200); startTime = Date.now();
        recBtn.textContent = "STOP RECORDING"; recBtn.classList.add('recording');
        statusText.textContent = "RECORDING"; scrubber.disabled = false;
        drawLiveWaveform(); startTimer();
    }

    function stopRecording() {
        mediaRecorder.stop(); cancelAnimationFrame(animationId); clearInterval(timerInterval);
        recBtn.textContent = "START RECORDING"; recBtn.classList.remove('recording');
        statusText.textContent = "IDLE"; dlBtn.disabled = false; exportBtn.disabled = false; loopBtn.disabled = false;
        const dur = (Date.now() - startTime) / 1000;
        scrubber.max = dur; scrubber.value = dur; scrubber.focus(); drawStaticWaveform();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if (mediaRecorder?.state === "recording") {
                const elapsed = (Date.now() - startTime) / 1000;
                timerText.textContent = elapsed.toFixed(1).padStart(4, '0');
                scrubber.max = elapsed; scrubber.value = elapsed;
                analyser.getByteTimeDomainData(dataArray);
                let sum = 0; for(let i=0; i<dataArray.length; i++) {
                    let v = (dataArray[i]-128)/128; sum += v*v;
                }
                amplitudeHistory.push(Math.sqrt(sum/dataArray.length));
            }
        }, 100);
    }

    function drawLiveWaveform() {
        animationId = requestAnimationFrame(drawLiveWaveform);
        analyser.getByteTimeDomainData(dataArray);
        cCtx.fillStyle = '#000'; cCtx.fillRect(0, 0, canvas.width, canvas.height);
        cCtx.lineWidth = 2; cCtx.strokeStyle = '#00ffcc'; cCtx.beginPath();
        let x = 0; const sw = canvas.width / dataArray.length;
        for (let i=0; i<dataArray.length; i++) {
            const y = (dataArray[i]/128.0) * canvas.height/2;
            (i===0) ? cCtx.moveTo(x, y) : cCtx.lineTo(x, y); x += sw;
        }
        cCtx.stroke();
    }

    function drawStaticWaveform() {
        cCtx.fillStyle = '#000'; cCtx.fillRect(0,0,canvas.width,canvas.height);
        cCtx.strokeStyle = '#00ffcc'; const bw = canvas.width / amplitudeHistory.length;
        for(let i=0; i<amplitudeHistory.length; i++){
            const h = amplitudeHistory[i]*canvas.height*2.5;
            cCtx.strokeRect(i*bw, (canvas.height-h)/2, bw, h);
        }
    }

    function dropMarker(type) {
        let time;
        if (mediaRecorder?.state === "recording") {
            time = (Date.now() - startTime) / 1000;
        } else {
            time = parseFloat(scrubber.value);
        }
        
        // Only drop if not a duplicate (within 0.1s)
        if (!markers.some(m => Math.abs(m.time - time) < 0.1)) {
            markers.push({time, type});
            redrawMarkers();
            statusText.textContent = `MARKED ${type.toUpperCase()}`;
        }
    }

    function redrawMarkers() {
        mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);
        markers.forEach(m => {
            const x = (m.time/scrubber.max)*mCanvas.width;
            mCtx.strokeStyle = (m.type === 'mistake') ? '#ff4757' : 'rgba(0, 255, 204, 0.8)';
            mCtx.lineWidth = 3; mCtx.beginPath(); mCtx.moveTo(x,0); mCtx.lineTo(x, mCanvas.height); mCtx.stroke();
        });
    }

    function seekTo(t, markNav = false) {
        const url = URL.createObjectURL(new Blob(recordedChunks, {type:'audio/webm'}));
        playback.src = url;
        playback.onloadedmetadata = () => {
            const safe = Math.max(0, Math.min(t, scrubber.max));
            playback.currentTime = safe; scrubber.value = safe;
            if (markNav) dropMarker('nav');
            playback.play(); statusText.textContent = `PLAY: ${safe.toFixed(1)}s`;
        };
    }

    playback.ontimeupdate = () => {
        if (!playback.paused) scrubber.value = playback.currentTime;
        if (!isLooping || markers.length < 2) return;
        const range = markers.slice(-2).sort((a,b) => a.time - b.time);
        if (playback.currentTime >= range[1].time || playback.currentTime < range[0].time) {
            playback.currentTime = range[0].time;
        }
    };

    mCanvas.onclick = (e) => {
        if (markers.length === 0) return;
        const rect = mCanvas.getBoundingClientRect();
        const clickT = ((e.clientX - rect.left)/mCanvas.width)*scrubber.max;
        const near = markers.reduce((p,c) => Math.abs(c.time-clickT) < Math.abs(p.time-clickT) ? c : p);
        if (Math.abs((near.time/scrubber.max)*mCanvas.width - (e.clientX-rect.left)) < 20) seekTo(near.time);
    };

    scrubber.oninput = () => seekTo(parseFloat(scrubber.value));
    
    // Global Keyboard Listener
    window.onkeydown = (e) => {
        if (e.code === "KeyM") {
            e.preventDefault();
            dropMarker('mistake');
        }
        
        if (mediaRecorder?.state === "recording") return;
        
        const step = Math.max(1, scrubber.max * 0.1);
        if (e.key === "ArrowLeft") { e.preventDefault(); seekTo(parseFloat(scrubber.value)-step, true); }
        else if (e.key === "ArrowRight") { e.preventDefault(); seekTo(parseFloat(scrubber.value)+step, true); }
        else if (e.code === "Space") { e.preventDefault(); playback.paused ? playback.play() : playback.pause(); }
    };
</script>
</body>
</html>
